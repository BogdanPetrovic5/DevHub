<app-app-navbar />

<div class="repo-page">

  <div class="repo-header">
    <div class="repo-header__inner">
      <div class="repo-header__top">
        <div class="repo-header__breadcrumb">
          <a class="repo-header__owner">{{ username }}</a>
          <span class="repo-header__sep">/</span>
          <span class="repo-header__name">{{ repoName }}</span>
        </div>
      </div>

      <nav class="repo-tabs">
        <a class="repo-tabs__item" [class.repo-tabs__item--active]="!isCommitsTab" (click)="navigate('repository/' + username + '/' + repoName)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          Code
        </a>
        <a class="repo-tabs__item" [class.repo-tabs__item--active]="isCommitsTab" (click)="navigate('repository/' + username + '/' + repoName + '/commits')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/>
            <circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/>
          </svg>
          Commits
        </a>
      </nav>
    </div>
  </div>

  <router-outlet />

</div>
