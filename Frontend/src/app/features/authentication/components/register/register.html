<div class="register">
  <div class="form-header">
    <h2 class="form-header__title">Create your account</h2>
    <p class="form-header__subtitle">Join millions of developers on DevHub</p>
  </div>

  <form class="form" [formGroup]="registerForm" (ngSubmit)="register()">
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <div class="input-wrapper">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input formControlName="username" class="input" id="username" type="text" placeholder="devuser" autocomplete="username" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="reg-email">Email</label>
      <div class="input-wrapper">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input formControlName="email" class="input" id="reg-email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="firstName">First name</label>
        <div class="input-wrapper">
          <input formControlName="firstName" class="input input--name" id="firstName" type="text" placeholder="John" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="lastName">Last name</label>
        <div class="input-wrapper">
          <input formControlName="lastName" class="input input--name" id="lastName" type="text" placeholder="Doe" />
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="reg-password">Password</label>
      <div class="input-wrapper">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input formControlName="password" class="input" id="reg-password" type="password" placeholder="••••••••" autocomplete="new-password" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm-password">Confirm password</label>
      <div class="input-wrapper">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
        </svg>
        <input formControlName="confirmPassword" class="input" [class.input--error]="passwordMismatch" id="confirm-password" type="password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      @if (passwordMismatch) {
        <span class="form-error">Passwords do not match</span>
      }
    </div>

    @if (errorMessage()) {
      <span class="form-error">{{ errorMessage() }}</span>
    }

    <p class="form-terms">
      By creating an account you agree to our
      <a href="#" class="form-link">Terms of Service</a> and
      <a href="#" class="form-link">Privacy Policy</a>.
    </p>

    <button type="submit" class="btn btn--primary btn--full" [disabled]="isLoading()">
      {{ isLoading() ? 'Creating account...' : 'Create account' }}
    </button>

    <div class="divider"><span>or continue with</span></div>

      <button type="button" class="btn btn--social">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      Continue with Google
    </button>
  </form>

  <p class="form-footer">
    Already have an account?
    <button class="form-link form-link--btn" (click)="switchToLogin.emit()">Sign in</button>
  </p>
</div>
