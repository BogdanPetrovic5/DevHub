<nav class="navbar">
  <div class="navbar__left">
    <a href="/" class="navbar__logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <path d="M16 2L4 8v16l12 6 12-6V8L16 2z" fill="#a6cfd5" stroke="#c2e7d9" stroke-width="1"/>
        <path d="M16 8l-6 3v8l6 3 6-3v-8L16 8z" fill="#26408b"/>
        <circle cx="16" cy="16" r="3" fill="#c2e7d9"/>
      </svg>
      <span class="navbar__logo-text">DevHub</span>
    </a>

    <div class="navbar__search">
      <svg class="navbar__search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Search repositories..." class="navbar__search-input" />
    </div>
  </div>

  <div class="navbar__right">
    <a href="/dashboard" class="navbar__link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Dashboard</span>
    </a>

    <a href="#" class="navbar__link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>Issues</span>
    </a>

    <button class="navbar__btn-new">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>New</span>
    </button>

    <div class="navbar__avatar">
      <div class="navbar__avatar-circle">B</div>
    </div>

    <!-- Hamburger — visible only below 620px -->
    <button class="navbar__hamburger" (click)="toggleDrawer()" [attr.aria-expanded]="drawerOpen()">
      @if (drawerOpen()) {
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      } @else {
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      }
    </button>
  </div>
</nav>

<!-- Backdrop -->
@if (drawerOpen()) {
  <div class="drawer-backdrop" (click)="closeDrawer()"></div>
}

<!-- Drawer -->
<div class="drawer" [class.drawer--open]="drawerOpen()">
  <div class="drawer__search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Search repositories..." class="drawer__search-input" />
  </div>

  <nav class="drawer__nav">
    <a href="/dashboard" class="drawer__link" (click)="closeDrawer()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Dashboard
    </a>
    <a href="#" class="drawer__link" (click)="closeDrawer()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Issues
    </a>
  
  </nav>

  <div class="drawer__divider"></div>

  <button class="drawer__btn-new">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    New Repository
  </button>

  <div class="drawer__profile">
    <div class="drawer__avatar">B</div>
    <div class="drawer__user-info">
      <span class="drawer__username">Bogdan</span>
      <span class="drawer__handle">&#64;bogdanpetrovic</span>
    </div>
  </div>
</div>
